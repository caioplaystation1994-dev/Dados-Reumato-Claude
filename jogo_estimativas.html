<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nem a Pato! - Jogo de Estimativas</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --accent: #f59e0b;
      --accent2: #ef4444;
      --green: #22c55e;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #475569;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #app {
      width: 100%;
      max-width: 640px;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      color: var(--accent);
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--accent);
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }

    .player-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .player-row input { flex: 1; }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #000; }
    .btn-danger  { background: var(--accent2); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-green   { background: var(--green); color: #000; }
    .btn-sm      { padding: 6px 12px; font-size: 0.8rem; }
    .btn-full    { width: 100%; margin-top: 8px; }

    .question-box {
      background: var(--surface2);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 20px;
      border-left: 4px solid var(--accent);
    }

    .question-box p { font-size: 1.15rem; font-weight: 600; line-height: 1.4; }
    .question-box .hint { margin-top: 8px; font-size: 0.82rem; color: var(--muted); }

    .turn-banner {
      text-align: center;
      padding: 14px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .turn-banner .name { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
    .turn-banner .role { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    .estimates-list { list-style: none; margin-bottom: 16px; }

    .estimates-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--surface2);
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .estimates-list li.highlighted {
      border: 1px solid var(--accent2);
      background: #2a1515;
    }

    .estimates-list li .player-name { font-weight: 700; }
    .estimates-list li .value { color: var(--accent); font-weight: 600; font-family: monospace; font-size: 0.95rem; }

    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 700;
    }

    .badge-win  { background: #14532d; color: #4ade80; }
    .badge-lose { background: #3b1d1d; color: #f87171; }

    .reveal-box {
      text-align: center;
      padding: 20px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .reveal-box .real-value { font-size: 2rem; font-weight: 800; color: var(--green); font-family: monospace; }
    .reveal-box .unit       { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

    .result-msg {
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .result-win     { background: #14532d; color: #4ade80; }
    .result-lose    { background: #3b1d1d; color: #f87171; }
    .result-neutral { background: var(--surface2); color: var(--muted); }

    /* Points assignment */
    .points-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .points-row:last-child { border-bottom: none; }

    .points-row .pname {
      flex: 1;
      font-weight: 700;
      font-size: 1rem;
    }

    .points-row .pts-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pts-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .pts-btn:active { transform: scale(0.93); }

    .pts-display {
      min-width: 48px;
      text-align: center;
      font-size: 1.3rem;
      font-weight: 800;
      font-family: monospace;
      color: var(--accent);
    }

    .pts-display.negative { color: var(--accent2); }

    .scoreboard { list-style: none; }

    .scoreboard li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--surface2);
      margin-bottom: 8px;
    }

    .scoreboard li.top { background: #292000; border: 1px solid var(--accent); }

    .scoreboard li .rank  { color: var(--muted); font-size: 0.85rem; width: 24px; }
    .scoreboard li .sname { font-weight: 700; flex: 1; margin-left: 8px; }
    .scoreboard li .pts   { font-family: monospace; font-size: 1.1rem; color: var(--accent); font-weight: 800; }

    .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
    .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }

    .section-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    .btn-add-player {
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .btn-add-player:hover { border-color: var(--accent); color: var(--accent); }

    .emoji { font-size: 2rem; margin-bottom: 8px; display: block; text-align: center; }

    .or-divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 10px 0;
    }

    .weight-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #292000;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 10px;
    }

    .double-badge {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 800;
      background: #1a2e00;
      color: #86efac;
      margin-left: 4px;
    }

    .delta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 12px;
      border-radius: 8px;
      background: var(--surface2);
      margin-bottom: 5px;
      font-size: 0.88rem;
    }

    .delta-plus  { color: #f87171; font-weight: 800; font-family: monospace; }
    .delta-minus { color: #4ade80; font-weight: 800; font-family: monospace; }

    .score-note {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .reveal-box .real-value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const QUESTIONS = [
  {
    id: 1,
    text: "Qual a altura (em cm) da pessoa mais alta que já viveu? — Robert Wadlow, EUA",
    hint: "Ele era bem acima de 2 metros",
    unit: "cm",
    realValue: 272,
    source: "Guinness World Records"
  },
  {
    id: 2,
    text: "Quantos cachorros-quentes Joey Chestnut comeu em 10 minutos? — recorde mundial (2021)",
    hint: "Pense em dezenas",
    unit: "cachorros-quentes",
    realValue: 76,
    source: "Guinness World Records, 2021"
  },
  {
    id: 3,
    text: "Quantos segundos durou o recorde mundial dos 100m rasos de Usain Bolt? (2009)",
    hint: "Entre 9 e 10 segundos — use decimais",
    unit: "segundos",
    realValue: 9.58,
    source: "Guinness World Records, 2009"
  },
  {
    id: 4,
    text: "Quantos minutos é o recorde mundial de prender a respiração embaixo d'água? — Budimir Šobat (2021)",
    hint: "Pense em mais de 20 minutos",
    unit: "minutos",
    realValue: 24.6,
    source: "Guinness World Records, 2021"
  },
  {
    id: 5,
    text: "Qual o peso em kg da maior abóbora já registrada? — Stefano Cutrupi, Itália (2021)",
    hint: "Pense em mais de 1 tonelada — responda em kg",
    unit: "kg",
    realValue: 1226,
    source: "Guinness World Records, 2021"
  },
  {
    id: 6,
    text: "Quantos idiomas Ziad Fazah fala? — recorde mundial de poliglota",
    hint: "Pense em dezenas de idiomas",
    unit: "idiomas",
    realValue: 58,
    source: "Guinness World Records"
  },
  {
    id: 7,
    text: "Qual a altura em metros do Burj Khalifa, o prédio mais alto do mundo?",
    hint: "Pense em centenas de metros",
    unit: "metros",
    realValue: 828,
    source: "Guinness World Records, 2010"
  },
  {
    id: 8,
    text: "Qual o comprimento em metros da maior barba já registrada? — Hans Langseth, Noruega",
    hint: "Pense em alguns metros",
    unit: "metros",
    realValue: 5.33,
    source: "Guinness World Records"
  },
  {
    id: 9,
    text: "Quantos Big Macs Donald Gorske comeu ao longo da vida? — recorde mundial (2022)",
    hint: "Pense em dezenas de milhares",
    unit: "Big Macs",
    realValue: 32672,
    source: "Guinness World Records, 2022"
  },
  {
    id: 10,
    text: "Quantas flexões Charles Servizio fez em 24 horas? — recorde mundial (1993)",
    hint: "Pense em dezenas de milhares",
    unit: "flexões",
    realValue: 46001,
    source: "Guinness World Records, 1993"
  },
  {
    id: 11,
    text: "Qual o comprimento total (em cm) das unhas mais longas já crescidas em mãos femininas? — Lee Redmond, EUA (2008)",
    hint: "Eram 10 unhas somadas — pense em centenas de centímetros",
    unit: "cm (total das 10 unhas)",
    realValue: 865,
    source: "Guinness World Records, 2008"
  },
  {
    id: 12,
    text: "Qual o peso em kg do maior cachorro doméstico já registrado? — Zorba, mastim inglês",
    hint: "Pense em mais de 100 kg",
    unit: "kg",
    realValue: 155,
    source: "Guinness World Records, 1989"
  }
];

// ─── STATE ──────────────────────────────────────────────────────────────────

const state = {
  screen: 'setup',         // setup | round | doubt | reveal | scoreboard | end
  players: [],             // [{name, score}]
  questions: [],           // shuffled subset, each with .weight (1-4)
  currentQ: 0,
  currentPlayer: 0,
  roundOrder: [],          // shuffled player indices for current lap
  roundOrderIdx: 0,        // position in roundOrder
  estimates: [],           // [{playerIdx, value, isDouble}]
  doubtInfo: null,         // {doubterIdx, targetEstimateIdx}
  pendingDeltas: [],       // [{playerIdx, delta, reason}] accumulated this round
  revealApplied: false,    // guard so scoring only runs once
  totalRounds: 5,
};

// ─── HELPERS ────────────────────────────────────────────────────────────────

function formatNumber(n) {
  if (n === undefined || n === null) return '?';
  if (n >= 1e12) return (n / 1e12).toLocaleString('pt-BR', {maximumFractionDigits: 2}) + ' tri';
  if (n >= 1e9)  return (n / 1e9).toLocaleString('pt-BR', {maximumFractionDigits: 2}) + ' bi';
  if (n >= 1e6)  return (n / 1e6).toLocaleString('pt-BR', {maximumFractionDigits: 2}) + ' mi';
  if (n >= 1e3)  return n.toLocaleString('pt-BR');
  return n.toLocaleString('pt-BR');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const screens = {
    setup: renderSetup, round: renderRound, doubt: renderDoubt,
    reveal: renderReveal, points: renderPoints,
    scoreboard: renderScoreboard, end: renderEnd,
  };
  const fn = screens[state.screen];
  if (fn) app.appendChild(fn());
}

// ─── SETUP ──────────────────────────────────────────────────────────────────

function renderSetup() {
  const frag = document.createDocumentFragment();

  frag.append(el('h1', {}, '🦆 Nem a Pato!'));
  frag.append(el('p', {className: 'subtitle'}, 'Recordes do Guinness — você acredita?'));

  const playersCard = el('div', {className: 'card'});
  playersCard.appendChild(el('h2', {}, 'Jogadores'));

  const playersList = el('div', {id: 'players-list'});

  function addPlayerRow(name = '') {
    const row = el('div', {className: 'player-row'});
    const inp = el('input', {type: 'text', placeholder: 'Nome do jogador', value: name});
    const del = el('button', {className: 'btn btn-ghost btn-sm'}, '✕');
    del.onclick = () => row.remove();
    row.append(inp, del);
    playersList.appendChild(row);
  }

  ['', '', ''].forEach(() => addPlayerRow());

  const addBtn = el('button', {className: 'btn-add-player'}, '+ Adicionar jogador');
  addBtn.onclick = () => addPlayerRow();

  playersCard.append(playersList, addBtn);
  frag.appendChild(playersCard);

  const roundsCard = el('div', {className: 'card'});
  roundsCard.appendChild(el('h2', {}, 'Configuração'));
  roundsCard.appendChild(el('label', {}, 'Número de rodadas'));
  roundsCard.appendChild(el('input', {type: 'number', id: 'rounds-input', value: '5', min: '1', max: '12'}));
  frag.appendChild(roundsCard);

  const rulesCard = el('div', {className: 'card'});
  rulesCard.appendChild(el('h2', {}, 'Regras'));
  [
    '🎯 Uma pergunta com peso ×1 a ×4 é revelada — o peso multiplica os pontos.',
    '🔀 A ordem dos jogadores é sorteada a cada volta.',
    '🔢 Cada jogador dá seu palpite em sequência.',
    '🦆 Antes do seu palpite você pode gritar "Nem a Pato!" ao anterior.',
    '📖 Isso revela o valor real: quem exagerou paga +peso; dúvida errada paga +peso.',
    '🔥 Se dobrar o palpite anterior e ninguém te duvidar: −peso por cada um que passar.',
    '🏆 Vence quem tiver MENOS pontos! (pontuação negativa é ótima!)',
  ].forEach(r => rulesCard.appendChild(el('p', {style: 'margin-bottom:8px;font-size:0.88rem;color:#cbd5e1'}, r)));
  frag.appendChild(rulesCard);

  const startBtn = el('button', {className: 'btn btn-primary btn-full'}, 'Começar Jogo');
  startBtn.onclick = startGame;
  frag.appendChild(startBtn);

  return frag;
}

function startGame() {
  const names = [...document.querySelectorAll('#players-list input')]
    .map(i => i.value.trim()).filter(Boolean);

  if (names.length < 2) { alert('Adicione pelo menos 2 jogadores!'); return; }

  const rounds = Math.min(12, Math.max(1, parseInt(document.getElementById('rounds-input').value) || 5));
  if (rounds > QUESTIONS.length) { alert(`Máximo de ${QUESTIONS.length} rodadas disponíveis.`); return; }

  state.players = names.map(name => ({ name, score: 0 }));
  state.questions = shuffle(QUESTIONS).slice(0, rounds).map(q => ({
    ...q,
    weight: Math.ceil(Math.random() * 4),
  }));
  state.totalRounds = rounds;
  state.currentQ = 0;
  beginRound();
}

function beginRound() {
  state.roundOrder = shuffle(state.players.map((_, i) => i));
  state.roundOrderIdx = 0;
  state.currentPlayer = state.roundOrder[0];
  state.estimates = [];
  state.doubtInfo = null;
  state.pendingDeltas = [];
  state.revealApplied = false;
  state.screen = 'round';
  render();
}

function advancePlayer() {
  state.roundOrderIdx = (state.roundOrderIdx + 1) % state.players.length;
  if (state.roundOrderIdx === 0) {
    // Completed a full lap — reshuffle for next lap
    state.roundOrder = shuffle(state.players.map((_, i) => i));
  }
  state.currentPlayer = state.roundOrder[state.roundOrderIdx];
}

// ─── ROUND ──────────────────────────────────────────────────────────────────

function renderRound() {
  const frag = document.createDocumentFragment();

  const q = state.questions[state.currentQ];
  const player = state.players[state.currentPlayer];
  const hasEstimate = state.estimates.length > 0;
  const lastEstimate = hasEstimate ? state.estimates[state.estimates.length - 1] : null;

  const prog = el('div', {className: 'progress-bar'});
  const fill = el('div', {className: 'progress-bar-fill'});
  fill.style.width = `${(state.currentQ / state.totalRounds) * 100}%`;
  prog.appendChild(fill);
  frag.appendChild(prog);

  frag.appendChild(el('p', {className: 'subtitle'}, `Rodada ${state.currentQ + 1} de ${state.totalRounds}`));

  // Question with weight badge
  const qbox = el('div', {className: 'question-box'});
  const wStars = '⭐'.repeat(q.weight) + '☆'.repeat(4 - q.weight);
  qbox.appendChild(el('div', {className: 'weight-badge'}, `⚡ Peso ×${q.weight}  ${wStars}`));
  qbox.appendChild(el('p', {}, q.text));
  qbox.appendChild(el('p', {className: 'hint'}, `💡 ${q.hint} · unidade: ${q.unit}`));
  frag.appendChild(qbox);

  // Pending deltas so far (double survivals)
  if (state.pendingDeltas.length > 0) {
    const pcard = el('div', {className: 'card', style: 'padding:12px 16px'});
    pcard.appendChild(el('p', {style: 'font-size:0.75rem;color:var(--muted);margin-bottom:8px;font-weight:700'}, 'PONTOS ACUMULADOS NESTA RODADA'));
    state.pendingDeltas.forEach(d => {
      const row = el('div', {className: 'delta-row'});
      row.appendChild(el('span', {}, state.players[d.playerIdx].name));
      row.appendChild(el('span', {className: d.delta < 0 ? 'delta-minus' : 'delta-plus'}, `${d.delta > 0 ? '+' : ''}${d.delta}`));
      pcard.appendChild(row);
    });
    frag.appendChild(pcard);
  }

  // All estimates so far this round
  if (hasEstimate) {
    const ul = el('ul', {className: 'estimates-list'});
    state.estimates.forEach(e => {
      const li = el('li');
      const nameSpan = el('span', {className: 'player-name'}, state.players[e.playerIdx].name);
      li.appendChild(nameSpan);
      if (e.isDouble) li.appendChild(el('span', {className: 'double-badge'}, '🔥 DOBROU!'));
      li.appendChild(el('span', {className: 'value'}, formatNumber(e.value)));
      ul.appendChild(li);
    });
    frag.appendChild(ul);
    frag.appendChild(el('hr', {className: 'section-divider'}));
  }

  // Turn banner
  const banner = el('div', {className: 'turn-banner'});
  banner.appendChild(el('div', {className: 'name'}, player.name));
  banner.appendChild(el('div', {className: 'role'}, 'é a sua vez!'));
  frag.appendChild(banner);

  // Doubt button — available when there's a previous estimate
  if (hasEstimate) {
    const prevPlayer = state.players[lastEstimate.playerIdx];
    const doubtBtn = el('button', {className: 'btn btn-danger btn-full'},
      `🦆 Nem a Pato! — duvidar de ${prevPlayer.name}`);
    doubtBtn.onclick = () => {
      state.doubtInfo = {
        doubterIdx: state.currentPlayer,
        targetEstimateIdx: state.estimates.length - 1,
      };
      state.screen = 'doubt';
      render();
    };
    frag.appendChild(doubtBtn);
    frag.appendChild(el('p', {className: 'or-divider'}, '— ou dê seu palpite —'));
  }

  // Estimate input
  const card = el('div', {className: 'card'});
  card.appendChild(el('label', {}, `Seu palpite (em ${q.unit}):`));
  const inp = el('input', {type: 'number', id: 'estimate-input', placeholder: '0', min: '0', step: 'any'});
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitEstimate(); });
  card.appendChild(inp);
  const submitBtn = el('button', {className: 'btn btn-primary btn-full'}, 'Confirmar Palpite →');
  submitBtn.onclick = submitEstimate;
  card.appendChild(submitBtn);
  frag.appendChild(card);

  return frag;
}

function submitEstimate() {
  const val = parseFloat(document.getElementById('estimate-input').value);
  if (isNaN(val) || val < 0) { alert('Digite um valor válido!'); return; }

  const W = state.questions[state.currentQ].weight;
  const prevEst = state.estimates.length > 0 ? state.estimates[state.estimates.length - 1] : null;

  // Previous estimate was a double and just survived (new estimate instead of doubt)
  if (prevEst && prevEst.isDouble) {
    state.pendingDeltas.push({ playerIdx: prevEst.playerIdx, delta: -W, reason: 'dobrou e sobreviveu' });
  }

  const isDouble = !!(prevEst && prevEst.value > 0 && val >= 2 * prevEst.value);
  state.estimates.push({ playerIdx: state.currentPlayer, value: val, isDouble });

  advancePlayer();
  render();
}

// ─── DOUBT ──────────────────────────────────────────────────────────────────

function renderDoubt() {
  const frag = document.createDocumentFragment();

  const q = state.questions[state.currentQ];
  const { doubterIdx, targetEstimateIdx } = state.doubtInfo;
  const doubter = state.players[doubterIdx];
  const targetEstimate = state.estimates[targetEstimateIdx];
  const target = state.players[targetEstimate.playerIdx];

  frag.appendChild(el('h1', {}, '🦆 Nem a Pato!'));

  const banner = el('div', {className: 'card', style: 'text-align:center'});
  banner.appendChild(el('span', {className: 'emoji'}, '🎯'));
  banner.appendChild(el('p', {style: 'font-size:1.1rem;font-weight:700;margin-bottom:12px'},
    `${doubter.name} duvidou de ${target.name}!`));
  banner.appendChild(el('p', {style: 'color:var(--muted);font-size:0.85rem'}, `${target.name} disse:`));
  banner.appendChild(el('p', {style: 'font-size:1.9rem;font-weight:800;color:var(--accent);font-family:monospace;margin:6px 0'},
    formatNumber(targetEstimate.value)));
  banner.appendChild(el('p', {style: 'color:var(--muted);font-size:0.8rem'}, q.unit));
  frag.appendChild(banner);

  const revealBtn = el('button', {className: 'btn btn-primary btn-full'}, '📖 Revelar Valor Real!');
  revealBtn.onclick = () => { state.screen = 'reveal'; render(); };
  frag.appendChild(revealBtn);

  return frag;
}

// ─── REVEAL ─────────────────────────────────────────────────────────────────

function renderReveal() {
  const frag = document.createDocumentFragment();

  const q = state.questions[state.currentQ];
  const W = q.weight;
  const realValue = q.realValue;
  const { doubterIdx, targetEstimateIdx } = state.doubtInfo;
  const targetEstimate = state.estimates[targetEstimateIdx];
  const doubter = state.players[doubterIdx];
  const target = state.players[targetEstimate.playerIdx];
  const targetOvershot = targetEstimate.value > realValue;

  // Apply scoring exactly once
  if (!state.revealApplied) {
    state.revealApplied = true;
    if (targetOvershot) {
      // Correct doubt: only the doubted player pays
      state.pendingDeltas.push({ playerIdx: targetEstimate.playerIdx, delta: +W, reason: `exagerou` });
    } else {
      // Wrong doubt: doubter pays
      state.pendingDeltas.push({ playerIdx: doubterIdx, delta: +W, reason: `dúvida errada` });
    }
    state.pendingDeltas.forEach(d => { state.players[d.playerIdx].score += d.delta; });
  }

  const prog = el('div', {className: 'progress-bar'});
  const fill = el('div', {className: 'progress-bar-fill'});
  fill.style.width = `${((state.currentQ + 1) / state.totalRounds) * 100}%`;
  prog.appendChild(fill);
  frag.appendChild(prog);

  frag.appendChild(el('h1', {style: 'margin-bottom:8px'}, '📖 Resposta!'));

  const qbox = el('div', {className: 'question-box'});
  const wStars = '⭐'.repeat(W) + '☆'.repeat(4 - W);
  qbox.appendChild(el('div', {className: 'weight-badge'}, `⚡ Peso ×${W}  ${wStars}`));
  qbox.appendChild(el('p', {}, q.text));
  frag.appendChild(qbox);

  // Real value
  const revealBox = el('div', {className: 'reveal-box'});
  revealBox.appendChild(el('p', {style: 'color:var(--muted);font-size:0.85rem;margin-bottom:6px'}, 'Valor real'));
  revealBox.appendChild(el('div', {className: 'real-value'}, formatNumber(realValue)));
  revealBox.appendChild(el('div', {className: 'unit'}, q.unit));
  revealBox.appendChild(el('div', {style: 'font-size:0.75rem;color:var(--muted);margin-top:8px'}, `Fonte: ${q.source}`));
  frag.appendChild(revealBox);

  // Verdict
  let msg, cls;
  if (targetOvershot) {
    msg = `${target.name} exagerou! (${formatNumber(targetEstimate.value)} > ${formatNumber(realValue)}) → +${W} ponto${W>1?'s':''}`;
    cls = 'result-lose';
  } else {
    msg = `${target.name} estava certo! (${formatNumber(targetEstimate.value)} ≤ ${formatNumber(realValue)}) → ${doubter.name} paga +${W} ponto${W>1?'s':''} 🦆`;
    cls = 'result-win';
  }
  frag.appendChild(el('div', {className: `result-msg ${cls}`}, msg));

  // All estimates with double badges
  const ul = el('ul', {className: 'estimates-list'});
  state.estimates.forEach((e, i) => {
    const isTarget = i === targetEstimateIdx;
    const li = el('li', {className: isTarget ? 'highlighted' : ''});
    li.appendChild(el('span', {className: 'player-name'}, state.players[e.playerIdx].name));
    if (e.isDouble) li.appendChild(el('span', {className: 'double-badge'}, '🔥 DOBROU!'));
    li.appendChild(el('span', {className: 'value'}, formatNumber(e.value)));
    if (isTarget) {
      li.appendChild(el('span', {className: `badge ${targetOvershot ? 'badge-lose' : 'badge-win'}`},
        targetOvershot ? '✗ exagerou' : '✓ certo'));
    }
    ul.appendChild(li);
  });
  frag.appendChild(ul);

  // Score changes this round
  const dcard = el('div', {className: 'card', style: 'padding:14px 16px'});
  dcard.appendChild(el('p', {style: 'font-size:0.75rem;color:var(--muted);margin-bottom:8px;font-weight:700'}, 'PONTOS DESTA RODADA'));
  // Group deltas by player
  const totals = {};
  state.pendingDeltas.forEach(d => { totals[d.playerIdx] = (totals[d.playerIdx] || 0) + d.delta; });
  Object.entries(totals).forEach(([idx, delta]) => {
    const row = el('div', {className: 'delta-row'});
    row.appendChild(el('span', {}, state.players[idx].name));
    row.appendChild(el('span', {className: delta < 0 ? 'delta-minus' : 'delta-plus'}, `${delta > 0 ? '+' : ''}${delta} pt${Math.abs(delta)!==1?'s':''}`));
    dcard.appendChild(row);
  });
  frag.appendChild(dcard);

  frag.appendChild(el('p', {className: 'score-note'}, '↓ menor pontuação = melhor posição'));

  const isLastRound = state.currentQ >= state.totalRounds - 1;
  const nextBtn = el('button', {className: `btn ${isLastRound ? 'btn-green' : 'btn-primary'} btn-full`},
    isLastRound ? '🏆 Ver Placar Final' : 'Ver Placar →');
  nextBtn.onclick = () => {
    state.currentQ++;
    if (state.currentQ >= state.totalRounds) {
      state.screen = 'end';
      render();
    } else {
      beginRound();          // resets round state and sets screen='round'
      state.screen = 'scoreboard'; // override to show scoreboard first
      render();
    }
  };
  frag.appendChild(nextBtn);

  return frag;
}

// ─── SCOREBOARD (between rounds) ────────────────────────────────────────────

function renderScoreboard() {
  const frag = document.createDocumentFragment();

  frag.appendChild(el('h1', {style: 'margin-bottom:4px'}, 'Placar'));
  frag.appendChild(el('p', {className: 'subtitle'}, `Após rodada ${state.currentQ} de ${state.totalRounds} · ↓ menor = melhor`));

  // Sort ASCENDING — fewest points wins
  const sorted = [...state.players]
    .map((p, i) => ({ ...p, idx: i }))
    .sort((a, b) => a.score - b.score);

  const ul = el('ul', {className: 'scoreboard'});
  sorted.forEach((p, rank) => {
    const li = el('li', {className: rank === 0 ? 'top' : ''});
    li.appendChild(el('span', {className: 'rank'}, rank === 0 ? '🥇' : `#${rank + 1}`));
    li.appendChild(el('span', {className: 'sname'}, p.name));
    li.appendChild(el('span', {className: 'pts'}, `${p.score > 0 ? '+' : ''}${p.score} pts`));
    ul.appendChild(li);
  });
  frag.appendChild(ul);

  const nextBtn = el('button', {className: 'btn btn-primary btn-full', style: 'margin-top:16px'},
    `Rodada ${state.currentQ + 1} →`);
  nextBtn.onclick = () => { state.screen = 'round'; render(); };  // round already initialized by beginRound
  frag.appendChild(nextBtn);

  return frag;
}

// ─── END ────────────────────────────────────────────────────────────────────

function renderEnd() {
  const frag = document.createDocumentFragment();

  // Sort ASCENDING — fewest points wins
  const sorted = [...state.players]
    .map((p, i) => ({ ...p, idx: i }))
    .sort((a, b) => a.score - b.score);

  const winner = sorted[0];

  frag.appendChild(el('h1', {style: 'margin-bottom:4px'}, '🏆 Fim de Jogo!'));

  const winCard = el('div', {className: 'card', style: 'text-align:center'});
  winCard.appendChild(el('span', {className: 'emoji'}, '🥇'));
  winCard.appendChild(el('p', {style: 'font-size:1.5rem;font-weight:800;color:var(--accent)'}, winner.name));
  winCard.appendChild(el('p', {style: 'color:var(--muted);margin-top:4px'},
    `${winner.score > 0 ? '+' : ''}${winner.score} pontos · Menor pontuação — Vencedor!`));
  frag.appendChild(winCard);

  const ul = el('ul', {className: 'scoreboard'});
  sorted.forEach((p, rank) => {
    const li = el('li', {className: rank === 0 ? 'top' : ''});
    li.appendChild(el('span', {className: 'rank'}, rank === 0 ? '🥇' : `#${rank + 1}`));
    li.appendChild(el('span', {className: 'sname'}, p.name));
    li.appendChild(el('span', {className: 'pts'}, `${p.score > 0 ? '+' : ''}${p.score} pts`));
    ul.appendChild(li);
  });
  frag.appendChild(ul);

  const newGameBtn = el('button', {className: 'btn btn-primary btn-full', style: 'margin-top:16px'}, '🔄 Jogar Novamente');
  newGameBtn.onclick = () => {
    Object.assign(state, {
      screen: 'setup', players: [], questions: [],
      currentQ: 0, currentPlayer: 0, estimates: [], doubtInfo: null,
    });
    render();
  };
  frag.appendChild(newGameBtn);

  return frag;
}

// ─── UTIL ───────────────────────────────────────────────────────────────────

function el(tag, attrs = {}, text) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else e.setAttribute(k, v);
  });
  if (text !== undefined) e.textContent = text;
  return e;
}

// ─── BOOT ───────────────────────────────────────────────────────────────────

render();
</script>
</body>
</html>
